name: Publish Skill to npm

on:
  push:
    branches:
      - main
    paths:
      - 'skills/*/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Detect changed skills and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git diff --name-only HEAD~1 HEAD | grep 'skills/.*/package.json' | while read pkg; do
            dir=$(dirname "$pkg")
            echo "📦 Publishing $dir..."
            cd "$dir"
            npm publish --access public
            cd -
          done
